name: Deploy to Production

on:
  push:
    branches:
      - main  # Or whatever your primary branch is

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Add any test dependencies if not in requirements.txt
          pip install pytest pytest-django

      - name: Run tests
        run: |
          pytest -v || echo "No tests found or tests failed"

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: devops/production/Dockerfile.production
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO_NAME }}:${{ secrets.DOCKER_REPO_TAG }}

  deploy-to-ec2:
    needs: docker-build-push
    runs-on: ubuntu-latest
    environment: Production
    env:
      ALLOWED_HOST: ${{ vars.ALLOWED_HOST }}
      DEBUG: ${{ vars.DEBUG }}
      APP_TITLE: ${{ vars.APP_TITLE }}
      SECRET_KEY: ${{ vars.SECRET_KEY }}
      DB_ENGINE: ${{ vars.DB_ENGINE }}
      DB_USER: ${{ vars.DB_USER }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_PASSWORD: ${{ vars.DB_PASSWORD }}
      DB_HOST: ${{ vars.DB_HOST }}
      DB_PORT: ${{ vars.DB_PORT }}
      DB_SSL_MODE: ${{ vars.DB_SSL_MODE }}
      STATICFILES_ROOT: ${{ vars.STATICFILES_ROOT }}
    steps:
      - name: Sync devops/production folder to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p ~/config/devops/production

      - name: Rsync production folder
        run: |
          rsync -avz --delete -e "ssh -i ${{ secrets.SERVER_SSH_KEY }}" devops/production/ ubuntu@${{ secrets.SERVER_IP }}:~/config/devops/production/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/config
            rm -f .env
            
            echo "ALLOWED_HOST=$ALLOWED_HOST" >> .env
            echo "DEBUG=$DEBUG" >> .env
            echo "APP_TITLE=$APP_TITLE" >> .env
            echo "SECRET_KEY=$SECRET_KEY" >> .env
            echo "DB_ENGINE=$DB_ENGINE" >> .env
            echo "DB_USER=$DB_USER" >> .env
            echo "DB_NAME=$DB_NAME" >> .env
            echo "DB_PASSWORD=$DB_PASSWORD" >> .env
            echo "DB_HOST=$DB_HOST" >> .env
            echo "DB_PORT=$DB_PORT" >> .env
            echo "DB_SSL_MODE=$DB_SSL_MODE" >> .env
            echo "STATICFILES_ROOT=$STATICFILES_ROOT" >> .env
            docker-compose -f devops/production/docker-compose-production.yaml down --remove-orphans || true

            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO_NAME }}:${{ secrets.DOCKER_REPO_TAG }}

            docker-compose -f devops/production/docker-compose-production.yaml --env-file .env up -d
            docker image prune -f
