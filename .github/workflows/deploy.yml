name: Deploy to Production

on:
  push:
    branches:
      - main  # Or whatever your primary branch is

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: Production
    env:
      ALLOWED_HOSTS: ${{ vars.TEST_ALLOWED_HOSTS }}
      DEBUG: ${{ vars.TEST_DEBUG }}
      DB_ENGINE: ${{ vars.TEST_DB_ENGINE }}
      DB_NAME: ${{ vars.TEST_DB_NAME }}
      APP_TITLE: ${{ vars.APP_TITLE }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      STATICFILES_ROOT: ${{ vars.STATICFILES_ROOT }}
      TIME_ZONE: ${{ vars.TIME_ZONE }}

    steps:
      - name: Create .env file
        run: |
          cat <<EOF > .env
          ALLOWED_HOSTS=${ALLOWED_HOSTS}
          DEBUG=${DEBUG}
          APP_TITLE=${APP_TITLE}
          SECRET_KEY=${SECRET_KEY}
          DB_ENGINE=${DB_ENGINE}
          DB_NAME=${DB_NAME}
          STATICFILES_ROOT=${STATICFILES_ROOT}
          TIME_ZONE=${TIME_ZONE}
          EOF

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: devops/production/Dockerfile.production
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO_NAME }}:${{ secrets.DOCKER_REPO_TAG }}

  deploy-to-ec2:
    needs: docker-build-push
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy production config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "devops/production/*"
          target: "~/config"
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: ALLOWED_HOSTS,DEBUG,APP_TITLE,SECRET_KEY,DB_ENGINE,DB_USER,DB_NAME,DB_PASSWORD,DB_HOST,DB_PORT,DB_SSL_MODE,STATICFILES_ROOT,TIME_ZONE,DOCKER_IMAGE
          script: |
            cd ~/config
            rm -f .env

            echo "ALLOWED_HOSTS=${ALLOWED_HOSTS}" >> .env
            echo "DEBUG=${DEBUG}" >> .env
            echo "APP_TITLE=${APP_TITLE}" >> .env
            echo "SECRET_KEY=${SECRET_KEY}" >> .env
            echo "DB_ENGINE=${DB_ENGINE}" >> .env
            echo "DB_USER=${DB_USER}" >> .env
            echo "DB_NAME=${DB_NAME}" >> .env
            echo "DB_PASSWORD=${DB_PASSWORD}" >> .env
            echo "DB_HOST=${DB_HOST}" >> .env
            echo "DB_PORT=${DB_PORT}" >> .env
            echo "DB_SSL_MODE=${DB_SSL_MODE}" >> .env
            echo "STATICFILES_ROOT=${STATICFILES_ROOT}" >> .env
            echo "TIME_ZONE=${TIME_ZONE}" >> .env

            docker-compose -f devops/production/docker-compose-production.yaml down --remove-orphans || true

            # Pull latest image
            docker pull ${DOCKER_IMAGE}

            # Start fresh
            docker-compose -f devops/production/docker-compose-production.yaml --env-file .env up -d

            # Cleanup unused images
            docker image prune -f
        env:
          ALLOWED_HOSTS: ${{ vars.ALLOWED_HOSTS }}
          DEBUG: ${{ vars.DEBUG }}
          APP_TITLE: ${{ vars.APP_TITLE }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DB_ENGINE: ${{ vars.DB_ENGINE }}
          DB_USER: ${{ vars.DB_USER }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ vars.DB_HOST }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_SSL_MODE: ${{ vars.DB_SSL_MODE }}
          STATICFILES_ROOT: ${{ vars.STATICFILES_ROOT }}
          TIME_ZONE: ${{ vars.TIME_ZONE }}
          DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO_NAME }}:${{ secrets.DOCKER_REPO_TAG }}
