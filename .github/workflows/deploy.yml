name: Deploy to Production

on:
  push:
    branches:
      - main  # Or whatever your primary branch is

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Add any test dependencies if not in requirements.txt
          pip install pytest pytest-django

      - name: Run tests
        run: |
          pytest -v || echo "No tests found or tests failed"

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: devops/production/Dockerfile.production
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO_NAME }}:${{ secrets.DOCKER_REPO_TAG }}

  deploy-to-ec2:
    needs: docker-build-push
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/config
            docker-compose -f devops/production/docker-compose-production.yaml --env-file .env pull
            docker-compose -f devops/production/docker-compose-production.yaml --env-file .env up -d
            docker image prune -f
